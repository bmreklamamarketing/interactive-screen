<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controller</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f3f3f3;
    }

    .wrap {
      padding: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 40px;
    }

    #pad {
      width: 100%;
      height: 60vh;
      background: white;
      border: 2px solid #ccc;
      border-radius: 16px;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 20px;
      user-select: none;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Управление экраном</h1>
    <div id="pad">Води пальцем здесь</div>
    <div id="status">Ожидание касания</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const pad = document.getElementById("pad");
    const statusEl = document.getElementById("status");

    function sendTouch(clientX, clientY) {
      const rect = pad.getBoundingClientRect();

      let x = (clientX - rect.left) / rect.width;
      let y = (clientY - rect.top) / rect.height;

      x = Math.max(0, Math.min(1, x));
      y = Math.max(0, Math.min(1, y));

      socket.emit("move", { x, y });
      statusEl.textContent = `x: ${x.toFixed(2)}, y: ${y.toFixed(2)}`;
    }

    pad.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      sendTouch(touch.clientX, touch.clientY);
    }, { passive: false });

    pad.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      sendTouch(touch.clientX, touch.clientY);
    }, { passive: false });

    pad.addEventListener("mousemove", (e) => {
      if (e.buttons !== 1) return;
      sendTouch(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
